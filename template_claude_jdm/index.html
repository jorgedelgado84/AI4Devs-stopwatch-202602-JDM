<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #d0d0d0;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 560px;
    }

    .display {
      width: 100%;
      background-color: #dde0f5;
      border: 3px solid #555;
      border-radius: 16px;
      padding: 20px 28px 28px;
      position: relative;
    }

    .time {
      display: block;
      text-align: center;
      font-size: clamp(3rem, 14vw, 7rem);
      font-weight: bold;
      letter-spacing: 0.04em;
      line-height: 1;
      color: #000;
    }

    .milliseconds {
      position: absolute;
      bottom: 10px;
      right: 18px;
      font-size: clamp(0.75rem, 3vw, 1.1rem);
      font-weight: bold;
      color: #000;
    }

    .buttons {
      display: flex;
      gap: 20px;
      width: 100%;
      justify-content: center;
    }

    button {
      flex: 1;
      max-width: 220px;
      padding: 18px 10px;
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      box-shadow: 0 4px 6px rgba(0,0,0,0.25);
      transition: filter 0.15s, transform 0.1s;
    }

    button:active {
      filter: brightness(0.85);
      transform: translateY(2px);
    }

    #btn-start {
      background-color: #3cb043;
    }

    #btn-start.paused {
      background-color: #1a6bbf;
    }

    #btn-clear {
      background-color: #c0392b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="display" role="timer" aria-live="off" aria-label="Cronómetro">
      <span class="time" id="time">00:00:00</span>
      <span class="milliseconds" id="ms">000</span>
    </div>
    <div class="buttons">
      <button id="btn-start" aria-label="Iniciar cronómetro">Start</button>
      <button id="btn-clear" aria-label="Reiniciar cronómetro">Clear</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
